<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Shots Fired</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23111' stroke='%23e63946' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%23e63946' stroke-width='1.5'/%3E%3Cline x1='16' y1='2' x2='16' y2='10' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='30' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='2' y1='16' x2='10' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='16' x2='30' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #09090b;
      --accent:       #ff4500;
      --accent-dim:   rgba(255, 69, 0, 0.15);
      --accent-border:rgba(255, 69, 0, 0.3);
      --text:         #f2f2f0;
      --text-muted:   #888;
      --border:       rgba(255, 255, 255, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark { width: 34px; height: 34px; flex-shrink: 0; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }

    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
      padding: 0.5rem 1.25rem !important;
      border-radius: 4px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 2rem 4rem;
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,69,0,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 20vw, 14rem);
      line-height: 1;
      color: var(--accent);
      letter-spacing: 0.05em;
      opacity: 0.15;
      user-select: none;
    }

    .message {
      margin-top: -2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .sub {
      margin-top: 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 38ch;
      line-height: 1.7;
    }

    .actions {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.8; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--accent-border);
    }

    /* ── HAMBURGER ── */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }

    .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 900px) {
      nav { padding: 1rem 1.5rem; flex-wrap: wrap; }
      .nav-toggle { display: flex; }
      .nav-links { display: none; flex-direction: column; align-items: flex-start; width: 100%; gap: 0; padding: 0.25rem 0 0.75rem; }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 0.6rem 0; font-size: 0.85rem; }
      .nav-cta { background: none !important; color: var(--accent) !important; padding: 0.6rem 0 !important; }
    }
  </style>

</head>
<body>

  <nav>
    <a href="/" class="nav-brand">
      <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="17" stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="8"  stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="3"  fill="#ff4500"/>
        <line x1="20" y1="3"  x2="20" y2="12" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="28" x2="20" y2="37" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3"  y1="20" x2="12" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="28" y1="20" x2="37" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Shots Fired</span>
    </a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#hosts">Hosts</a></li>
      <li><a href="/#episodes">Episodes</a></li>
      <li><a href="/blogs.html">Blog</a></li>
      <li><a href="/#subscribe" class="nav-cta">Subscribe</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main>
    <div class="glow"></div>
    <div class="code">404</div>
    <h1 class="message">That shot missed.</h1>
    <p class="sub">This page doesn't exist — or it did, and someone deleted it without telling anyone. Classic.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Back to home</a>
      <a href="/blogs.html" class="btn btn-secondary">Read the blog</a>
    </div>
  </main>

  <script>
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var links  = document.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', String(open));
      });
      links.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          links.classList.remove('open');
          toggle.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        });
      });
    })();
  </script>

</body>
</html>
