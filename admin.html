<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Shots Fired</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23111' stroke='%23e63946' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%23e63946' stroke-width='1.5'/%3E%3Cline x1='16' y1='2' x2='16' y2='10' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='30' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='2' y1='16' x2='10' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='16' x2='30' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:            #09090b;
      --bg-card:       #111115;
      --bg-elevated:   #18181d;
      --accent:        #ff4500;
      --accent-dim:    rgba(255, 69, 0, 0.15);
      --accent-border: rgba(255, 69, 0, 0.3);
      --text:          #f2f2f0;
      --text-muted:    #888;
      --text-subtle:   #555;
      --border:        rgba(255, 255, 255, 0.07);
      --green:         #22c55e;
      --green-dim:     rgba(34, 197, 94, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark { width: 34px; height: 34px; flex-shrink: 0; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .nav-user .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
    }

    .btn-logout {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-subtle);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.375rem 0.875rem;
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-logout:hover { color: var(--text); border-color: var(--text-subtle); }

    /* ── MAIN LAYOUT ── */
    main {
      position: relative;
      z-index: 1;
      padding: 7rem 3rem 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 2.5rem;
    }

    .page-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .page-eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1.5px;
      background: var(--accent);
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    /* ── EDITOR GRID ── */
    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 900px) {
      .editor-grid { grid-template-columns: 1fr; }
    }

    /* ── FORM PANEL ── */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .panel-header i { color: var(--accent); font-size: 0.65rem; }

    .panel-body { padding: 1.5rem; }

    /* ── FORM ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.125rem;
    }

    .form-group:last-child { margin-bottom: 0; }

    label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    label .required {
      color: var(--accent);
      margin-left: 0.2em;
    }

    input, select, textarea {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      padding: 0.625rem 0.875rem;
      transition: border-color 0.2s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-border);
    }

    select option { background: var(--bg-elevated); }

    textarea {
      resize: vertical;
      line-height: 1.65;
      font-size: 0.8125rem;
    }

    #body-input {
      height: 360px;
      font-family: 'Courier New', monospace;
    }

    /* ── PREVIEW PANEL ── */
    .preview-content {
      padding: 1.5rem;
      min-height: 200px;
    }

    .preview-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-subtle);
      font-size: 0.85rem;
      font-style: italic;
    }

    /* Blog-style markdown rendering */
    .preview-content h1,
    .preview-content h2,
    .preview-content h3 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.04em;
      margin: 1.5rem 0 0.75rem;
      color: var(--text);
    }

    .preview-content h1 { font-size: 2rem; }
    .preview-content h2 { font-size: 1.6rem; }
    .preview-content h3 { font-size: 1.25rem; }

    .preview-content p { margin-bottom: 1rem; color: #ccc; font-size: 0.9375rem; }

    .preview-content ul, .preview-content ol {
      margin: 0 0 1rem 1.5rem;
      color: #ccc;
    }

    .preview-content li { margin-bottom: 0.25rem; }

    .preview-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1.25rem;
      margin: 1.5rem 0;
      background: var(--accent-dim);
      border-radius: 0 6px 6px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .preview-content code {
      font-family: 'Courier New', monospace;
      background: var(--bg-elevated);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.85em;
      color: var(--accent);
    }

    .preview-content pre {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .preview-content pre code {
      background: none;
      padding: 0;
      color: #ccc;
    }

    /* ── META PREVIEW ── */
    .meta-preview {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .meta-preview .author-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── ACTIONS BAR ── */
    .actions-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 0.7rem 1.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.7rem 1.25rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      text-decoration: none;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--text-subtle); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      max-width: 380px;
      transform: translateY(120%);
      transition: transform 0.3s ease;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    #toast.show { transform: translateY(0); }

    #toast.success {
      background: var(--green-dim);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--green);
    }

    #toast.error {
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      color: var(--accent);
    }

    #toast i { margin-top: 0.15rem; flex-shrink: 0; }

    /* ── LOADING STATE ── */
    #page-loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { padding: 1rem 1.25rem; }
      main { padding: 6rem 1.25rem 3rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Loading screen while auth check runs -->
  <div id="page-loading">
    <div class="spinner"></div>
  </div>

  <!-- ─── NAV ─── -->
  <nav>
    <a href="/" class="nav-brand">
      <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="17" stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="8"  stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="3"  fill="#ff4500"/>
        <line x1="20" y1="3"  x2="20" y2="12" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="28" x2="20" y2="37" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3"  y1="20" x2="12" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="28" y1="20" x2="37" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Shots Fired</span>
    </a>
    <div class="nav-right">
      <div class="nav-user" id="nav-user" style="display:none">
        <div class="avatar" id="nav-avatar"></div>
        <span id="nav-username"></span>
      </div>
      <a href="/.auth/logout?post_logout_redirect_uri=/" class="btn-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </div>
  </nav>

  <!-- ─── MAIN ─── -->
  <main id="main-content" style="display:none">

    <div class="page-header">
      <div class="page-eyebrow">Admin</div>
      <h1 class="page-title">New Blog Post</h1>
    </div>

    <div class="editor-grid">

      <!-- ── LEFT: Form ── -->
      <div>
        <div class="panel">
          <div class="panel-header">
            <i class="fas fa-pen"></i>
            Post details
          </div>
          <div class="panel-body">
            <form id="blog-form" novalidate>

              <div class="form-group">
                <label for="title-input">Title <span class="required">*</span></label>
                <input type="text" id="title-input" placeholder="Enter post title…" autocomplete="off" required>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="slug-input">Slug <span class="required">*</span></label>
                  <input type="text" id="slug-input" placeholder="auto-generated-from-title" autocomplete="off" required>
                </div>
                <div class="form-group">
                  <label for="date-input">Date <span class="required">*</span></label>
                  <input type="date" id="date-input" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label for="author-select">Author <span class="required">*</span></label>
                  <select id="author-select" required>
                    <option value="">Select author…</option>
                    <option value="roelant" data-name="Roelant Dieben">Roelant Dieben</option>
                    <option value="stuart"  data-name="Stuart van der Lee">Stuart van der Lee</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="tags-input">Tags</label>
                  <input type="text" id="tags-input" placeholder="azure, ai, cloud" autocomplete="off">
                </div>
              </div>

              <div class="form-group">
                <label for="excerpt-input">Excerpt <span class="required">*</span></label>
                <textarea id="excerpt-input" rows="2" placeholder="One or two sentences that appear on the blog listing page…" required></textarea>
              </div>

              <div class="form-group">
                <label for="body-input">Body (Markdown) <span class="required">*</span></label>
                <textarea id="body-input" placeholder="Write your post in Markdown…" required></textarea>
              </div>

              <div class="actions-bar">
                <button type="submit" class="btn-primary" id="submit-btn">
                  <i class="fas fa-paper-plane"></i>
                  Publish post
                </button>
                <a href="/" class="btn-secondary">
                  <i class="fas fa-arrow-left"></i>
                  Cancel
                </a>
                <span id="submit-status" style="font-size:0.8rem; color: var(--text-muted); margin-left:auto;"></span>
              </div>

            </form>
          </div>
        </div>
      </div>

      <!-- ── RIGHT: Preview ── -->
      <div style="display:flex; flex-direction:column; gap:1rem;">

        <div class="panel" style="flex:1;">
          <div class="panel-header">
            <i class="fas fa-eye"></i>
            Preview
          </div>
          <div class="meta-preview" id="preview-meta" style="display:none">
            <div class="author-avatar" id="preview-avatar"></div>
            <span id="preview-author-name"></span>
            <span style="color:var(--text-subtle)">·</span>
            <span id="preview-date"></span>
          </div>
          <div class="preview-content empty" id="preview-body">
            <span>Start typing to see a preview…</span>
          </div>
        </div>

      </div>

    </div>

  </main>

  <!-- ─── TOAST ─── -->
  <div id="toast" role="alert" aria-live="assertive">
    <i class="fas fa-circle" id="toast-icon"></i>
    <span id="toast-message"></span>
  </div>

  <script>
    // ─── Auth check ──────────────────────────────────────────────────────────
    (async function init() {
      try {
        const resp = await fetch('/.auth/me');
        const data = await resp.json();
        const principal = data.clientPrincipal;

        if (!principal) {
          window.location.href = '/.auth/login/aad?post_login_redirect_uri=/admin';
          return;
        }

        // Show user info in nav
        const initials = (principal.userDetails || principal.userId || '?')
          .split(/[\s@.]+/)
          .filter(Boolean)
          .slice(0, 2)
          .map(w => w[0].toUpperCase())
          .join('');

        document.getElementById('nav-avatar').textContent  = initials || '?';
        document.getElementById('nav-username').textContent = principal.userDetails || principal.userId;
        document.getElementById('nav-user').style.display  = 'flex';

        // Reveal page
        document.getElementById('page-loading').style.display  = 'none';
        document.getElementById('main-content').style.display  = 'block';

        initForm();
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = '/.auth/login/aad?post_login_redirect_uri=/admin';
      }
    })();

    // ─── Form logic ──────────────────────────────────────────────────────────
    function initForm() {
      const titleInput   = document.getElementById('title-input');
      const slugInput    = document.getElementById('slug-input');
      const dateInput    = document.getElementById('date-input');
      const authorSelect = document.getElementById('author-select');
      const tagsInput    = document.getElementById('tags-input');
      const excerptInput = document.getElementById('excerpt-input');
      const bodyInput    = document.getElementById('body-input');

      // Default date to today
      dateInput.value = new Date().toISOString().slice(0, 10);

      // Auto-generate slug from title
      let slugManuallyEdited = false;
      titleInput.addEventListener('input', () => {
        updatePreviewTitle();
        if (!slugManuallyEdited) {
          slugInput.value = toSlug(titleInput.value);
        }
      });
      slugInput.addEventListener('input', () => {
        slugManuallyEdited = slugInput.value !== toSlug(titleInput.value);
      });

      // Live preview
      bodyInput.addEventListener('input',    updatePreviewBody);
      authorSelect.addEventListener('change', updatePreviewMeta);
      dateInput.addEventListener('input',    updatePreviewMeta);

      // Form submission
      document.getElementById('blog-form').addEventListener('submit', handleSubmit);
    }

    function toSlug(str) {
      return str
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .trim()
        .replace(/[\s]+/g, '-')
        .replace(/-+/g, '-');
    }

    function updatePreviewBody() {
      const val = document.getElementById('body-input').value.trim();
      const container = document.getElementById('preview-body');
      if (!val) {
        container.className = 'preview-content empty';
        container.innerHTML = '<span>Start typing to see a preview…</span>';
        return;
      }
      container.className = 'preview-content';
      container.innerHTML = marked.parse(val);
    }

    function updatePreviewTitle() { /* title shown in meta bar */ }

    function updatePreviewMeta() {
      const select = document.getElementById('author-select');
      const option = select.options[select.selectedIndex];
      const name   = option ? option.dataset.name || '' : '';
      const date   = document.getElementById('date-input').value;
      const meta   = document.getElementById('preview-meta');

      if (name) {
        const initials = name.split(' ').map(w => w[0]).join('').toUpperCase();
        document.getElementById('preview-avatar').textContent       = initials;
        document.getElementById('preview-author-name').textContent  = name;
        document.getElementById('preview-date').textContent         = date
          ? new Date(date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
          : '';
        meta.style.display = 'flex';
      } else {
        meta.style.display = 'none';
      }
    }

    // ─── Submit ──────────────────────────────────────────────────────────────
    async function handleSubmit(e) {
      e.preventDefault();

      const title  = document.getElementById('title-input').value.trim();
      const slug   = document.getElementById('slug-input').value.trim();
      const date   = document.getElementById('date-input').value;
      const select = document.getElementById('author-select');
      const authorSlug = select.value;
      const author = select.options[select.selectedIndex]?.dataset.name || '';
      const tags   = document.getElementById('tags-input').value.trim();
      const excerpt = document.getElementById('excerpt-input').value.trim();
      const body   = document.getElementById('body-input').value.trim();

      if (!title || !slug || !date || !authorSlug || !excerpt || !body) {
        showToast('error', 'Please fill in all required fields.');
        return;
      }

      const btn    = document.getElementById('submit-btn');
      const status = document.getElementById('submit-status');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publishing…';
      status.textContent = '';

      try {
        const resp = await fetch('/api/create-blog', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ title, slug, author, authorSlug, date, tags, excerpt, body })
        });

        const result = await resp.json();

        if (!resp.ok) {
          throw new Error(result.error || `HTTP ${resp.status}`);
        }

        showToast('success', `Post published! It will go live once the deploy completes.`);
        status.textContent = `Slug: /blog/${result.slug}`;
        document.getElementById('blog-form').reset();
        document.getElementById('date-input').value = new Date().toISOString().slice(0, 10);
        document.getElementById('preview-body').className = 'preview-content empty';
        document.getElementById('preview-body').innerHTML = '<span>Start typing to see a preview…</span>';
        document.getElementById('preview-meta').style.display = 'none';

      } catch (err) {
        showToast('error', err.message || 'Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publish post';
      }
    }

    // ─── Toast ───────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(type, message) {
      const toast = document.getElementById('toast');
      const icon  = document.getElementById('toast-icon');
      document.getElementById('toast-message').textContent = message;
      toast.className = `show ${type}`;
      icon.className  = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = toast.className.replace('show', '').trim(); }, 5000);
    }
  </script>

</body>
</html>
