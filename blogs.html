<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Shots Fired</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23111' stroke='%23e63946' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%23e63946' stroke-width='1.5'/%3E%3Cline x1='16' y1='2' x2='16' y2='10' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='30' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='2' y1='16' x2='10' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='16' x2='30' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <meta name="description" content="Longer reads from the Shots Fired hosts — opinions, deep dives, and takes that didn't fit in an episode.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --bg:           #09090b;
      --bg-card:      #111115;
      --bg-elevated:  #18181d;
      --accent:       #ff4500;
      --accent-dim:   rgba(255, 69, 0, 0.15);
      --accent-border:rgba(255, 69, 0, 0.3);
      --text:         #f2f2f0;
      --text-muted:   #888;
      --text-subtle:  #555;
      --border:       rgba(255, 255, 255, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark { width: 34px; height: 34px; flex-shrink: 0; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
      padding: 0.5rem 1.25rem !important;
      border-radius: 4px;
    }

    .nav-cta:hover { opacity: 0.88; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 10rem 3rem 5rem;
      max-width: 1160px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--accent);
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 9vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      margin-bottom: 1.5rem;
    }

    .page-subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.75;
    }

    /* ── BLOG GRID ── */
    .blog-list-wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 3rem 8rem;
    }

    .blog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .blog-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .blog-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: height 0.3s ease;
    }

    .blog-card:hover {
      border-color: var(--accent-border);
      background: var(--bg-elevated);
      transform: translateY(-3px);
    }

    .blog-card:hover::before { height: 100%; }

    .blog-card-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .blog-author-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .blog-author-avatar-fallback {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .blog-meta-text { display: flex; flex-direction: column; gap: 0.1rem; }

    .blog-author-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
    }

    .blog-date {
      font-size: 0.72rem;
      color: var(--text-subtle);
      letter-spacing: 0.05em;
    }

    .blog-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.02em;
      line-height: 1.05;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .blog-card-excerpt {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.75rem;
    }

    .blog-read-more {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: gap 0.2s;
    }

    .blog-card:hover .blog-read-more { gap: 0.7rem; }

    /* Empty / loading state */
    .blog-empty {
      text-align: center;
      padding: 6rem 0;
      color: var(--text-subtle);
      font-size: 0.9rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 3rem;
    }

    .footer-wrap {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text);
    }

    .footer-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
    }

    .footer-copy {
      font-size: 0.78rem;
      color: var(--text-subtle);
    }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.1rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .page-header { padding: 8rem 1.5rem 3.5rem; }
      .blog-list-wrap { padding: 0 1.5rem 5rem; }
      .blog-grid { grid-template-columns: 1fr; }
      .footer-wrap { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ─── NAV ─── -->
  <nav>
    <a href="index.html" class="nav-brand">
      <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="17" stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="8"  stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="3"  fill="#ff4500"/>
        <line x1="20" y1="3"  x2="20" y2="12" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="28" x2="20" y2="37" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3"  y1="20" x2="12" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="28" y1="20" x2="37" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Shots Fired</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#hosts">Hosts</a></li>
      <li><a href="index.html#episodes">Episodes</a></li>
      <li><a href="blogs.html" class="active">Blog</a></li>
      <li><a href="index.html#subscribe" class="nav-cta">Subscribe</a></li>
    </ul>
  </nav>

  <!-- ─── PAGE HEADER ─── -->
  <div class="page-header">
    <div class="section-label">From the Hosts</div>
    <h1 class="page-title">THE BLOG</h1>
    <p class="page-subtitle">Longer reads, deeper dives, and takes that need more than a podcast episode to do justice.</p>
  </div>

  <!-- ─── POST LIST ─── -->
  <div class="blog-list-wrap">
    <div class="blog-grid" id="blog-grid">
      <p class="blog-empty">Loading posts…</p>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer>
    <div class="footer-wrap">
      <a href="index.html" class="footer-brand">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="17" stroke="#ff4500" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="8"  stroke="#ff4500" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="3"  fill="#ff4500"/>
          <line x1="20" y1="3"  x2="20" y2="12" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="28" x2="20" y2="37" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="3"  y1="20" x2="12" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="28" y1="20" x2="37" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="footer-brand-name">Shots Fired</span>
      </a>
      <span class="footer-copy">&copy; 2026 Shots Fired. All rights reserved.</span>
    </div>
  </footer>

  <script>
    const AVATAR = { roelant: 'image/roelant.jpg', stuart: 'image/stuart.jpg' };
    const INITIALS = { roelant: 'RD', stuart: 'SL' };

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function avatarHtml(slug, name) {
      if (AVATAR[slug]) {
        return `<img class="blog-author-avatar" src="${AVATAR[slug]}" alt="${name}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="blog-author-avatar-fallback" style="display:none">${INITIALS[slug] || '?'}</span>`;
      }
      return `<span class="blog-author-avatar-fallback">${INITIALS[slug] || '?'}</span>`;
    }

    fetch('blogs.json')
      .then(r => r.json())
      .then(posts => {
        const grid = document.getElementById('blog-grid');
        if (!posts.length) {
          grid.innerHTML = '<p class="blog-empty">No posts yet. Check back soon.</p>';
          return;
        }
        grid.innerHTML = posts.map((post, i) => `
          <a href="blog.html?slug=${post.slug}" class="blog-card reveal" style="transition-delay:${i * 0.1}s">
            <div class="blog-card-meta">
              ${avatarHtml(post.authorSlug, post.author)}
              <div class="blog-meta-text">
                <span class="blog-author-name">${post.author}</span>
                <span class="blog-date">${formatDate(post.date)}</span>
              </div>
            </div>
            <h2 class="blog-card-title">${post.title}</h2>
            <p class="blog-card-excerpt">${post.excerpt}</p>
            <span class="blog-read-more">Read article →</span>
          </a>
        `).join('');

        // Scroll reveal
        const observer = new IntersectionObserver(
          entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
          { threshold: 0.1 }
        );
        grid.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      })
      .catch(() => {
        document.getElementById('blog-grid').innerHTML =
          '<p class="blog-empty">Could not load posts. Try opening via a local server.</p>';
      });
  </script>

</body>
</html>
