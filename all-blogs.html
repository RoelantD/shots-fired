  <style>
    :root {
      --bg:           #09090b;
      --bg-card:      #111115;
      --bg-elevated:  #18181d;
      --accent:       #ff4500;
      --accent-dim:   rgba(255, 69, 0, 0.15);
      --accent-border:rgba(255, 69, 0, 0.3);
      --text:         #f2f2f0;
      --text-muted:   #888;
      --text-subtle:  #555;
      --border:       rgba(255, 255, 255, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand { display: flex; align-items: center; gap: 0.875rem; text-decoration: none; color: var(--text); }
    .logo-mark { width: 34px; height: 34px; flex-shrink: 0; }
    .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 0.08em; }

    .nav-links { list-style: none; display: flex; align-items: center; gap: 2.5rem; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-cta { background: var(--accent) !important; color: #fff !important; padding: 0.5rem 1.25rem !important; border-radius: 4px; }
    .nav-cta:hover { opacity: 0.88; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 10rem 3rem 4rem;
      max-width: 1160px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-subtle);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text-muted); }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::before { content: ''; display: block; width: 24px; height: 1.5px; background: var(--accent); }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 9vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 520px;
      line-height: 1.75;
      margin-top: 1.5rem;
    }

    .post-count {
      font-size: 0.85rem;
      color: var(--text-subtle);
      margin-top: 1rem;
    }

    /* ── FILTERS ── */
    .filters-wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-subtle);
      margin-right: 0.25rem;
      flex-shrink: 0;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--text-subtle); }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* Author filter uses avatar style */
    .filter-btn.author-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-btn.author-btn img {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(1) opacity(0.6);
      transition: filter 0.2s;
    }

    .filter-btn.author-btn.active img,
    .filter-btn.author-btn:hover img { filter: none; }

    /* ── BLOG LIST WRAP ── */
    .blog-list-wrap {
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 3rem 4rem;
    }

    /* ── BLOG GRID ── */
    .blog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      min-height: 200px;
    }

    .blog-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .blog-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--accent); transition: height 0.3s ease; }
    .blog-card:hover { border-color: var(--accent-border); background: var(--bg-elevated); transform: translateY(-3px); }
    .blog-card:hover::before { height: 100%; }

    .blog-card-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }

    .blog-author-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--border); flex-shrink: 0; }
    .blog-author-avatar-fallback { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-elevated); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: var(--accent); flex-shrink: 0; letter-spacing: 0.05em; }
    .blog-meta-text { display: flex; flex-direction: column; gap: 0.1rem; }
    .blog-author-name { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .blog-date { font-size: 0.72rem; color: var(--text-subtle); letter-spacing: 0.05em; }

    .blog-card-category {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-border);
      border-radius: 3px;
      padding: 0.15rem 0.5rem;
      margin-bottom: 0.75rem;
    }

    .blog-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.02em; line-height: 1.05; margin-bottom: 1rem; color: var(--text); }
    .blog-card-excerpt { font-size: 0.9rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 1.75rem; }

    .blog-read-more { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); display: inline-flex; align-items: center; gap: 0.4rem; transition: gap 0.2s; }
    .blog-card:hover .blog-read-more { gap: 0.7rem; }

    /* ── NO RESULTS ── */
    .blog-empty { text-align: center; padding: 5rem 0; color: var(--text-subtle); font-size: 0.9rem; grid-column: 1 / -1; }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 3rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
    }

    .page-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 0.875rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      min-width: 38px;
      text-align: center;
    }

    .page-btn:hover:not(:disabled) { color: var(--text); border-color: var(--text-subtle); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); font-weight: 600; }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--border); padding: 2.5rem 3rem; }
    .footer-wrap { max-width: 1160px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text); }
    .footer-brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.08em; }
    .footer-copy { font-size: 0.78rem; color: var(--text-subtle); }

    /* ── HAMBURGER ── */
    .nav-toggle { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0; }
    .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: transform 0.25s, opacity 0.25s; }
    .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.1rem 1.5rem; flex-wrap: wrap; }
      .nav-toggle { display: flex; }
      .nav-links { display: none; flex-direction: column; align-items: flex-start; width: 100%; gap: 0; padding: 0.25rem 0 0.75rem; }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 0.6rem 0; font-size: 0.85rem; }
      .nav-cta { background: none !important; color: var(--accent) !important; padding: 0.6rem 0 !important; }
      .page-header { padding: 8rem 1.5rem 3rem; }
      .filters-wrap { padding: 0 1.5rem 2rem; }
      .blog-list-wrap { padding: 0 1.5rem 4rem; }
      .blog-grid { grid-template-columns: 1fr; }
      .footer-wrap { flex-direction: column; gap: 1rem; text-align: center; }
    }

  <script>
    const AVATAR   = { roelant: 'image/roelant.jpg', stuart: 'image/stuart.jpg' };
    const INITIALS = { roelant: 'RD', stuart: 'SL' };
    const PAGE_SIZE = 10;

    let allPosts     = [];
    let filteredPosts = [];
    let currentPage  = 1;
    let activeCategory = 'all';
    let activeAuthor   = 'all';

    function formatDate(iso) {
      return new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function avatarHtml(authorSlug, author) {
      if (AVATAR[authorSlug]) {
        return `<img class="blog-author-avatar" src="${AVATAR[authorSlug]}" alt="${author}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="blog-author-avatar-fallback" style="display:none">${INITIALS[authorSlug] || '?'}</span>`;
      }
      return `<span class="blog-author-avatar-fallback">${INITIALS[authorSlug] || '?'}</span>`;
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
      if (!match) return {};
      const meta = {};
      match[1].split('\n').forEach(line => {
        const colon = line.indexOf(':');
        if (colon === -1) return;
        const key   = line.slice(0, colon).trim();
        const value = line.slice(colon + 1).trim().replace(/^["']|["']$/g, '');
        if (key) meta[key] = value;
      });
      return meta;
    }

    function cardHtml(post) {
      return `
        <a href="/blog/${post.slug}" class="blog-card">
          <div class="blog-card-meta">
            ${avatarHtml(post.authorSlug, post.author)}
            <div class="blog-meta-text">
              <span class="blog-author-name">${post.author || ''}</span>
              <span class="blog-date">${post.date ? formatDate(post.date) : ''}</span>
            </div>
          </div>
          ${post.category ? `<span class="blog-card-category">${post.category}</span>` : ''}
          <h2 class="blog-card-title">${post.title || post.slug}</h2>
          <p class="blog-card-excerpt">${post.excerpt || ''}</p>
          <span class="blog-read-more">Read article →</span>
        </a>`;
    }

    function applyFilters() {
      filteredPosts = allPosts.filter(p => {
        const catMatch    = activeCategory === 'all' || (p.category || '').toLowerCase() === activeCategory.toLowerCase();
        const authorMatch = activeAuthor   === 'all' || p.authorSlug === activeAuthor;
        return catMatch && authorMatch;
      });
      currentPage = 1;
      render();
    }

    function render() {
      const grid       = document.getElementById('blog-grid');
      const pagination = document.getElementById('pagination');
      const totalPages = Math.ceil(filteredPosts.length / PAGE_SIZE);
      const start      = (currentPage - 1) * PAGE_SIZE;
      const page       = filteredPosts.slice(start, start + PAGE_SIZE);

      // Update count
      const label = activeCategory === 'all' && activeAuthor === 'all'
        ? `${filteredPosts.length} posts`
        : `${filteredPosts.length} of ${allPosts.length} posts`;
      document.getElementById('post-count').textContent = label;

      if (!filteredPosts.length) {
        grid.innerHTML = '<p class="blog-empty">No posts match the selected filters.</p>';
        pagination.style.display = 'none';
        return;
      }

      grid.innerHTML = page.map(cardHtml).join('');

      // Pagination
      if (totalPages <= 1) {
        pagination.style.display = 'none';
        return;
      }

      pagination.style.display = 'flex';
      let html = `<button class="page-btn" id="prev-btn" ${currentPage === 1 ? 'disabled' : ''}>←</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      html += `<button class="page-btn" id="next-btn" ${currentPage === totalPages ? 'disabled' : ''}>→</button>`;
      pagination.innerHTML = html;

      pagination.querySelector('#prev-btn')?.addEventListener('click', () => { currentPage--; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
      pagination.querySelector('#next-btn')?.addEventListener('click', () => { currentPage++; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
      pagination.querySelectorAll('[data-page]').forEach(btn => {
        btn.addEventListener('click', () => { currentPage = +btn.dataset.page; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
      });
    }

    // Category filter buttons
    document.getElementById('category-filter').addEventListener('click', e => {
      const btn = e.target.closest('[data-category]');
      if (!btn) return;
      document.querySelectorAll('[data-category]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.category;
      applyFilters();
    });

    // Author filter buttons
    document.getElementById('author-filter').addEventListener('click', e => {
      const btn = e.target.closest('[data-author]');
      if (!btn) return;
      document.querySelectorAll('[data-author]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeAuthor = btn.dataset.author;
      applyFilters();
    });

    // Load posts
    fetch('blogs.json')
      .then(r => r.json())
      .then(slugs => Promise.all(
        slugs.map(slug =>
          fetch(`blogs/${slug}.md`)
            .then(r => { if (!r.ok) throw new Error(); return r.text(); })
            .then(text => ({ slug, ...parseFrontmatter(text) }))
            .catch(() => null)
        )
      ))
      .then(posts => {
        allPosts = posts
          .filter(Boolean)
          .sort((a, b) => new Date(b.date) - new Date(a.date));
        applyFilters();
      })
      .catch(() => {
        document.getElementById('blog-grid').innerHTML = '<p class="blog-empty">Could not load posts.</p>';
      });
  </script>

  <script>
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var links  = document.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', String(open));
      });
      links.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          links.classList.remove('open');
          toggle.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        });
      });
    })();
  </script>
</body>
</html>
