  <meta name="description" content="Meet the Shots Fired host.">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --bg:           #09090b;
      --bg-card:      #111115;
      --bg-elevated:  #18181d;
      --accent:       #ff4500;
      --accent-dim:   rgba(255, 69, 0, 0.15);
      --accent-border:rgba(255, 69, 0, 0.3);
      --text:         #f2f2f0;
      --text-muted:   #888;
      --text-subtle:  #555;
      --border:       rgba(255, 255, 255, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark { width: 34px; height: 34px; flex-shrink: 0; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
      padding: 0.5rem 1.25rem !important;
      border-radius: 4px;
    }

    .nav-cta:hover { opacity: 0.88; }

    /* ── PAGE OUTER ── */
    .page-outer {
      padding-top: 8rem;
      padding-bottom: 8rem;
    }

    .page-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-subtle);
      text-decoration: none;
      margin-bottom: 3.5rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    /* ── HOST HERO ── */
    .host-hero {
      display: flex;
      align-items: flex-start;
      gap: 3rem;
      margin-bottom: 3.5rem;
    }

    .host-hero-avatar {
      flex-shrink: 0;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--accent-border);
      background: var(--bg-elevated);
      position: relative;
    }

    .host-hero-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .host-hero-avatar-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .host-hero-info {
      flex: 1;
      min-width: 0;
      padding-top: 0.5rem;
    }

    .host-hero-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .host-hero-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--accent);
    }

    .host-hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      line-height: 0.92;
      letter-spacing: 0.02em;
      margin-bottom: 0.75rem;
    }

    .host-hero-role {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
    }

    .host-badges {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .host-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.65rem;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    a.host-badge:hover {
      border-color: var(--accent-border);
      color: var(--text);
    }

    .host-badge img { width: 14px; height: 14px; }

    /* ── DIVIDER ── */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    /* ── BIO ── */
    .host-bio {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #d4d4d0;
      margin-bottom: 2.5rem;
    }

    /* ── PULL QUOTE ── */
    .pull-quote {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 3rem 0;
      gap: 1.5rem;
    }

    .pull-quote .pq-line {
      display: block;
      width: 2.5rem;
      height: 1.5px;
      background: var(--accent);
    }

    .pull-quote p {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.45rem;
      line-height: 1.6;
      color: var(--text);
      max-width: 560px;
      margin: 0;
    }

    /* ── SOCIAL LINKS ── */
    .host-socials {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .host-social-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.55rem 1.1rem;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .host-social-btn:hover {
      color: var(--text);
      border-color: var(--accent-border);
      background: var(--bg-card);
    }

    /* ── POSTS SECTION ── */
    .posts-section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .posts-section-label::before {
      content: '';
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--accent);
    }

    .posts-section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 0.95;
      letter-spacing: 0.02em;
      margin-bottom: 2rem;
    }

    /* ── BLOG GRID ── */
    .blog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .blog-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2rem;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .blog-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: height 0.3s ease;
    }

    .blog-card:hover {
      border-color: var(--accent-border);
      background: var(--bg-elevated);
      transform: translateY(-3px);
    }

    .blog-card:hover::before { height: 100%; }

    .blog-card-date {
      font-size: 0.72rem;
      color: var(--text-subtle);
      letter-spacing: 0.05em;
      margin-bottom: 0.85rem;
    }

    .blog-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.75rem;
      letter-spacing: 0.02em;
      line-height: 1.05;
      margin-bottom: 0.85rem;
      color: var(--text);
    }

    .blog-card-excerpt {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .blog-read-more {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: gap 0.2s;
    }

    .blog-card:hover .blog-read-more { gap: 0.7rem; }

    .blog-empty {
      color: var(--text-subtle);
      font-size: 0.9rem;
      padding: 2rem 0;
    }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.visible { opacity: 1; transform: none; }

    /* ── LOADING ── */
    .page-loading {
      text-align: center;
      padding: 5rem 0;
      color: var(--text-subtle);
      font-size: 0.9rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 3rem;
    }

    .footer-wrap {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text);
    }

    .footer-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
    }

    .footer-copy { font-size: 0.78rem; color: var(--text-subtle); }

    /* ── HAMBURGER ── */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
    }

    .nav-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }

    .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.1rem 1.5rem; flex-wrap: wrap; }
      .nav-toggle { display: flex; }
      .nav-links { display: none; flex-direction: column; align-items: flex-start; width: 100%; gap: 0; padding: 0.25rem 0 0.75rem; }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 0.6rem 0; font-size: 0.85rem; }
      .nav-cta { background: none !important; color: var(--accent) !important; padding: 0.6rem 0 !important; }
      .page-container { padding: 0 1.5rem; }
      .host-hero { flex-direction: column; gap: 1.75rem; }
      .host-hero-avatar { width: 96px; height: 96px; }
      .blog-grid { grid-template-columns: 1fr; }
      .pull-quote p { font-size: 1.2rem; }
      .footer-wrap { flex-direction: column; gap: 1rem; text-align: center; }
      footer { padding: 2rem 1.5rem; }
    }
  </style>

  <script>
    function formatDate(iso) {
      return new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const colon = line.indexOf(':');
        if (colon === -1) return;
        const key   = line.slice(0, colon).trim();
        const value = line.slice(colon + 1).trim().replace(/^["']|["']$/g, '');
        if (key) meta[key] = value;
      });
      return { meta, body: match[2] };
    }

    function badgesHtml(badges) {
      return badges.map(b => {
        const inner = `<img src="${b.icon}" alt="" width="14" height="14"> ${b.label}`;
        return b.url
          ? `<a href="${b.url}" class="host-badge" target="_blank" rel="noopener noreferrer">${inner}</a>`
          : `<span class="host-badge">${inner}</span>`;
      }).join('');
    }

    function blogCardHtml(post, i) {
      return `
        <a href="/blog/${post.slug}" class="blog-card reveal" style="transition-delay:${i * 0.1}s">
          <div class="blog-card-date">${post.date ? formatDate(post.date) : ''}</div>
          <h3 class="blog-card-title">${post.title || post.slug}</h3>
          <p class="blog-card-excerpt">${post.excerpt || ''}</p>
          <span class="blog-read-more">Read article →</span>
        </a>
      `;
    }

    function renderHost(host, posts) {
      const container = document.getElementById('page-container');

      const postsHtml = posts.length
        ? `<div class="blog-grid" id="blog-grid">
            ${posts.map((p, i) => blogCardHtml(p, i)).join('')}
           </div>`
        : `<p class="blog-empty">No posts yet — check back soon.</p>`;

      container.innerHTML = `
        <a href="/#hosts" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          All hosts
        </a>

        <div class="host-hero">
          <div class="host-hero-avatar">
            <img src="${host.avatar}" alt="${host.name}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <span class="host-hero-avatar-fallback">${host.initials}</span>
          </div>
          <div class="host-hero-info">
            <div class="host-hero-label">Host</div>
            <h1 class="host-hero-name">${host.name}</h1>
            <div class="host-hero-role">${host.title} &middot; ${host.company}</div>
            <div class="host-badges">${badgesHtml(host.badges)}</div>
          </div>
        </div>

        <hr class="section-divider">

        <p class="host-bio">${host.bio}</p>

        <div class="pull-quote">
          <span class="pq-line"></span>
          <p>"${host.quote}"</p>
          <span class="pq-line"></span>
        </div>

        <div class="host-socials">
          <a href="${host.linkedin}" class="host-social-btn" target="_blank" rel="noopener">
            <i class="fab fa-linkedin"></i> LinkedIn
          </a>
        </div>

        <hr class="section-divider">

        <div class="posts-section-label">From the blog</div>
        <h2 class="posts-section-title">POSTS BY ${host.name.split(' ')[0].toUpperCase()}</h2>

        ${postsHtml}
      `;

      document.title = `${host.name} — Shots Fired`;

      // Scroll reveal for blog cards
      const observer = new IntersectionObserver(
        entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
        { threshold: 0.1 }
      );
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    function showError(msg) {
      document.getElementById('page-container').innerHTML =
        `<p class="page-loading">${msg}</p>`;
    }

    // Extract slug from /host/<slug>
    const pathSlug = window.location.pathname.match(/\/host\/([^/]+)/)?.[1];
    const slug = pathSlug || new URLSearchParams(window.location.search).get('slug');

    if (!slug) {
      window.location.replace('/404.html');
    } else {
      Promise.all([
        fetch('/hosts.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('/blogs.json').then(r => { if (!r.ok) throw new Error(); return r.json(); })
      ])
      .then(([hosts, slugs]) => {
        const host = hosts.find(h => h.slug === slug);
        if (!host) { window.location.replace('/404.html'); return; }

        // Fetch all blog posts, filter by this host's slug
        return Promise.all(
          slugs.map(s =>
            fetch(`/blogs/${s}.md`)
              .then(r => { if (!r.ok) throw new Error(); return r.text(); })
              .then(text => ({ slug: s, ...parseFrontmatter(text).meta }))
              .catch(() => null)
          )
        ).then(posts => {
          const hostPosts = posts
            .filter(p => p && p.authorSlug === slug)
            .sort((a, b) => new Date(b.date) - new Date(a.date));
          renderHost(host, hostPosts);
        });
      })
      .catch(() => showError('Could not load host data.'));
    }
  </script>

  <script>
    (function () {
      var toggle = document.querySelector('.nav-toggle');
      var links  = document.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.classList.toggle('open', open);
        toggle.setAttribute('aria-expanded', String(open));
      });
      links.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          links.classList.remove('open');
          toggle.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        });
      });
    })();
  </script>
</body>
</html>
