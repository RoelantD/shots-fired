<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Shots Fired</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23111' stroke='%23e63946' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='5' fill='none' stroke='%23e63946' stroke-width='1.5'/%3E%3Cline x1='16' y1='2' x2='16' y2='10' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='30' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='2' y1='16' x2='10' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='22' y1='16' x2='30' y2='16' stroke='%23e63946' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
  <meta name="description" content="A Shots Fired blog post.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    :root {
      --bg:           #09090b;
      --bg-card:      #111115;
      --bg-elevated:  #18181d;
      --accent:       #ff4500;
      --accent-dim:   rgba(255, 69, 0, 0.15);
      --accent-border:rgba(255, 69, 0, 0.3);
      --text:         #f2f2f0;
      --text-muted:   #888;
      --text-subtle:  #555;
      --border:       rgba(255, 255, 255, 0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(9, 9, 11, 0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark { width: 34px; height: 34px; flex-shrink: 0; }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.08em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
      padding: 0.5rem 1.25rem !important;
      border-radius: 4px;
    }

    .nav-cta:hover { opacity: 0.88; }

    /* ── ARTICLE LAYOUT ── */
    .article-outer {
      padding-top: 8rem;
      padding-bottom: 8rem;
    }

    .article-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-subtle);
      text-decoration: none;
      margin-bottom: 3.5rem;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    /* Post header */
    .post-header { margin-bottom: 3.5rem; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }

    .post-author-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--border);
      flex-shrink: 0;
    }

    .post-author-avatar-fallback {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .post-meta-text { display: flex; flex-direction: column; gap: 0.15rem; }

    .post-author-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }

    .post-date {
      font-size: 0.75rem;
      color: var(--text-subtle);
      letter-spacing: 0.05em;
    }

    .post-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      line-height: 0.92;
      letter-spacing: 0.02em;
      margin-bottom: 0;
    }

    /* Divider between header and body */
    .post-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    /* ── POST BODY TYPOGRAPHY ── */
    .post-body {
      font-size: 1.05rem;
      line-height: 1.85;
      color: #d4d4d0;
    }

    .post-body h1,
    .post-body h2,
    .post-body h3 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-top: 3rem;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .post-body h1 { font-size: 3.5rem; }
    .post-body h2 { font-size: 2.25rem; }
    .post-body h3 { font-size: 1.6rem; }

    .post-body p { margin-bottom: 1.5rem; }

    .post-body p:last-child { margin-bottom: 0; }

    .post-body strong { color: var(--text); font-weight: 600; }

    .post-body em { font-style: italic; }

    .post-body a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity 0.2s;
    }

    .post-body a:hover { opacity: 0.8; }

    .post-body ul,
    .post-body ol {
      margin-left: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .post-body li { margin-bottom: 0.4rem; }

    .post-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    /* ── PULL QUOTE ── */
    .pull-quote {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin: 3.5rem 0;
      padding: 0;
      gap: 1.5rem;
    }

    .pull-quote .pq-line {
      display: block;
      width: 2.5rem;
      height: 1.5px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .pull-quote p {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.45rem;
      line-height: 1.6;
      color: var(--text);
      max-width: 560px;
      margin: 0;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 3rem;
    }

    .footer-wrap {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text);
    }

    .footer-brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.08em;
    }

    .footer-copy { font-size: 0.78rem; color: var(--text-subtle); }

    /* Loading / error states */
    .post-loading {
      text-align: center;
      padding: 5rem 0;
      color: var(--text-subtle);
      font-size: 0.9rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 1.1rem 1.5rem; }
      .nav-links { gap: 1.5rem; }
      .article-container { padding: 0 1.5rem; }
      .pull-quote p { font-size: 1.2rem; }
      .footer-wrap { flex-direction: column; gap: 1rem; text-align: center; }
      footer { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- ─── NAV ─── -->
  <nav>
    <a href="index.html" class="nav-brand">
      <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="17" stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="8"  stroke="#ff4500" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="3"  fill="#ff4500"/>
        <line x1="20" y1="3"  x2="20" y2="12" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="20" y1="28" x2="20" y2="37" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="3"  y1="20" x2="12" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="28" y1="20" x2="37" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Shots Fired</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#hosts">Hosts</a></li>
      <li><a href="index.html#episodes">Episodes</a></li>
      <li><a href="blogs.html" class="active">Blog</a></li>
      <li><a href="index.html#subscribe" class="nav-cta">Subscribe</a></li>
    </ul>
  </nav>

  <!-- ─── ARTICLE ─── -->
  <div class="article-outer">
    <div class="article-container" id="article-container">
      <p class="post-loading">Loading…</p>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer>
    <div class="footer-wrap">
      <a href="index.html" class="footer-brand">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="17" stroke="#ff4500" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="8"  stroke="#ff4500" stroke-width="1.5"/>
          <circle cx="20" cy="20" r="3"  fill="#ff4500"/>
          <line x1="20" y1="3"  x2="20" y2="12" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20" y1="28" x2="20" y2="37" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="3"  y1="20" x2="12" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="28" y1="20" x2="37" y2="20" stroke="#ff4500" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="footer-brand-name">Shots Fired</span>
      </a>
      <span class="footer-copy">&copy; 2026 Shots Fired. All rights reserved.</span>
    </div>
  </footer>

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script>
    const AVATAR   = { roelant: 'image/roelant.jpg', stuart: 'image/stuart.jpg' };
    const INITIALS = { roelant: 'RD', stuart: 'SL' };

    function formatDate(iso) {
      return new Date(iso + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function avatarHtml(authorSlug, author) {
      if (AVATAR[authorSlug]) {
        return `<img class="post-author-avatar" src="${AVATAR[authorSlug]}" alt="${author}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="post-author-avatar-fallback" style="display:none">${INITIALS[authorSlug] || '?'}</span>`;
      }
      return `<span class="post-author-avatar-fallback">${INITIALS[authorSlug] || '?'}</span>`;
    }

    // Parse YAML frontmatter from a markdown string.
    // Returns { meta: { title, author, authorSlug, date, excerpt, tags }, body: '...' }
    function parseFrontmatter(text) {
      const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const colon = line.indexOf(':');
        if (colon === -1) return;
        const key   = line.slice(0, colon).trim();
        const value = line.slice(colon + 1).trim().replace(/^["']|["']$/g, '');
        if (key) meta[key] = value;
      });
      return { meta, body: match[2] };
    }

    // Transform blockquotes into styled pull quotes
    function applyPullQuotes(html) {
      return html.replace(
        /<blockquote>\s*<p>([\s\S]*?)<\/p>\s*<\/blockquote>/g,
        '<div class="pull-quote"><span class="pq-line"></span><p>$1</p><span class="pq-line"></span></div>'
      );
    }

    function renderArticle(slug, meta, body) {
      const rawHtml  = marked.parse(body);
      const postHtml = applyPullQuotes(rawHtml);

      const container = document.getElementById('article-container');
      container.innerHTML = `
        <a href="blogs.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          All posts
        </a>

        <header class="post-header">
          <div class="post-meta">
            ${avatarHtml(meta.authorSlug, meta.author)}
            <div class="post-meta-text">
              <span class="post-author-name">${meta.author || 'Unknown'}</span>
              <span class="post-date">${meta.date ? formatDate(meta.date) : ''}</span>
            </div>
          </div>
          <h1 class="post-title">${meta.title || slug}</h1>
        </header>

        <hr class="post-divider">

        <div class="post-body">${postHtml}</div>
      `;

      document.title = `${meta.title || slug} — Shots Fired`;
    }

    function showError(msg) {
      document.getElementById('article-container').innerHTML =
        `<p class="post-loading">${msg}</p>`;
    }

    // Read slug from /blog/<slug> path, or fall back to ?slug= query string
    const pathSlug = window.location.pathname.match(/\/blog\/([^/]+)/)?.[1];
    const slug = pathSlug || new URLSearchParams(window.location.search).get('slug');
    if (!slug) {
      window.location.replace('/404.html');
    } else {
      fetch(`/blogs/${slug}.md`)
        .then(r => {
          if (!r.ok) throw new Error('Post not found');
          return r.text();
        })
        .then(text => {
          const { meta, body } = parseFrontmatter(text);
          renderArticle(slug, meta, body);
        })
        .catch(() => {
          window.location.replace('/404.html');
        });
    }
  </script>

</body>
</html>
